<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ConfirmX</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>ConfirmX</h1>
  <p>Check your ticket confirmation chances</p>

  <!-- 🔹 PNR SECTION (UNCHANGED) -->
  <input type="text" id="pnr" placeholder="Enter PNR Number">

  <button onclick="fetchPNR()">Check Now</button>

  <div id="resultBox">

    <h2 id="result"></h2>
    <p id="message"></p>

    <!-- TRAIN INFO -->
    <div class="card" id="trainInfo"></div>

    <!-- PASSENGER INFO -->
    <div class="card" id="passengerInfo"></div>

    <!-- EXTRA INFO -->
    <div class="card" id="extraInfo"></div>

  </div>

  <!-- 🔥 NEW SECTION (ADDED BELOW PNR) -->
  <hr style="margin: 30px 0;">

  <h2>Check Seat Availability</h2>

  <input type="text" id="source" placeholder="Source (NDLS)">
  <input type="text" id="destination" placeholder="Destination (GKP)">
  <input type="date" id="date">
  <input type="text" id="trainNumber" placeholder="Optional Train Number">

  <button onclick="fetchTrains()">Search Trains</button>

  <div id="trainResult"></div>

</div>

<!-- OLD PNR JS -->
<script src="script.js"></script>

<!-- NEW TRAIN JS -->
<script src="train.js"></script>

</body>
</html>
