<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ConfirmX - Ticket Predictor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>ConfirmX</h1>
  <p>Enter your PNR to check confirmation chances</p>

  <input type="text" id="pnr" placeholder="Enter PNR Number">
  <button onclick="fetchPNR()">Check Now</button>

  <div id="resultBox">
    <h2 id="result"></h2>
    <p id="message"></p>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
