<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ConfirmX - Ticket Predictor</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>ConfirmX</h1>
    <p>Check your ticket confirmation chances</p>

    <input type="number" id="wl" placeholder="Enter WL Number">

    <select id="class">
      <option value="1.2">Sleeper</option>
      <option value="1.0">3AC</option>
      <option value="0.8">2AC</option>
      <option value="0.5">1AC</option>
    </select>

    <select id="quota">
      <option value="GNWL">GNWL</option>
      <option value="PQWL">PQWL</option>
      <option value="RLWL">RLWL</option>
    </select>

    <select id="festival">
      <option value="1">Normal</option>
      <option value="0.85">Weekend</option>
      <option value="0.75">Holiday</option>
      <option value="0.55">Festival</option>
    </select>

    <select id="days">
      <option value="1.2">7+ Days</option>
      <option value="1.0">4–7 Days</option>
      <option value="0.7">2–3 Days</option>
      <option value="0.5">0–1 Day</option>
    </select>

    <button onclick="calculate()">Check Probability</button>

    <h2 id="result"></h2>
  </div>

  <script src="script.js"></script>
</body>
</html>
