<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ConfirmX</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <h1>ConfirmX</h1>
    <p>Check your ticket confirmation chances</p>
  </header>

  <!-- ✅ PNR SECTION (YOUR OLD LOGIC WORKS HERE) -->
  <section class="section">
    <h2>PNR Status</h2>

    <div class="form-row center">
      <input type="text" id="pnrInput" placeholder="Enter PNR Number">
      <button onclick="fetchPNR()">Check Now</button>
    </div>

    <div id="pnrResult"></div>
  </section>

  <!-- ✅ TRAIN SECTION -->
  <section class="section">
    <h2>Check Seat Availability</h2>

    <div class="form-row">
      <input type="text" id="source" placeholder="Source (NDLS)">
      <input type="text" id="destination" placeholder="Destination (GKP)">
      <input type="date" id="date">
      <input type="text" id="trainNumber" placeholder="Optional Train Number">
      <button id="trainBtn">Search</button>
    </div>

    <div id="trainResult"></div>
  </section>

  <!-- ✅ IMPORTANT -->
  <script src="script.js"></script> <!-- PNR -->
  <script src="train.js"></script>  <!-- TRAIN -->

</body>
</html>
