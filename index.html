<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/png" href="favicon.png">
  <title>ConfirmX - Train Ticket Prediction System</title>

<meta name="description" content="Check train ticket confirmation chances instantly with ConfirmX. Accurate PNR prediction and seat availability analysis.">
  <meta property="og:title" content="ConfirmX - Train Ticket Prediction">
<meta property="og:description" content="Smart train ticket prediction with real-time data.">
<meta property="og:image" content="https://gaurava3.github.io/ConfirmX/favicon.png">
<meta property="og:url" content="https://gaurava3.github.io/ConfirmX/">
<meta property="og:type" content="website">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>ConfirmX</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <h1>ConfirmX</h1>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <h2>Train Ticket Prediction System</h2>
    <p>Accurate confirmation chances using smart prediction</p>
  </section>

  <!-- PNR SECTION -->
  <section class="container">
    <div class="card-glass">
      <h2>🔍 TICKET CONFORMATION PREDICTTOR BY PNR</h2>

      <div class="form-row center">
        <input type="text" id="pnrInput" placeholder="Enter PNR Number">
        <button onclick="fetchPNR()">Check Now</button>
      </div>

      <div id="pnrResult"></div>
      
    </div>
  </section>

  <!-- TRAIN SECTION -->
  <section class="container">
    <div class="card-glass">
      <h2>🚆 TICKET CONFORMATION PREDICTTOR</h2>

     <div class="form-grid">
  <input id="source" placeholder="Source (e.g. NDLS)">
  <input id="destination" placeholder="Destination (e.g. GKP)">
  <input type="date" id="date">
  <input id="trainNumber" placeholder="Train Number (Optional)">
</div>

<button onclick="fetchTrain()">Search</button>

      <div id="trainResult"></div>
     
    </div>
  </section>

  <script src="script.js"></script>
  <script src="train.js"></script>

</body>
</html>
