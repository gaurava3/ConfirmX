<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ConfirmX</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="navbar">
  <h1>ConfirmX</h1>
  <div class="menu">
    <button onclick="showSection('pnrSection')">PNR Check</button>
    <button onclick="showSection('trainSection')">Train Search</button>
  </div>
</div>

<!-- PNR SECTION -->
<div id="pnrSection" class="section active">
  <h2>Check PNR Status</h2>
  <input type="text" id="pnrInput" placeholder="Enter PNR">
  <button onclick="fetchPNR()">Check Now</button>

  <div id="pnrResult"></div>
</div>

<!-- TRAIN SECTION -->
<div id="trainSection" class="section">
  <h2>Check Seat Availability</h2>

  <input type="text" id="source" placeholder="Source (NDLS)">
  <input type="text" id="destination" placeholder="Destination (GKP)">
  <input type="date" id="date">
  <input type="text" id="trainNumber" placeholder="Optional Train Number">

  <button onclick="fetchTrains()">Search</button>

  <div id="trainResult"></div>
</div>

<script src="script.js"></script>
</body>
</html>
