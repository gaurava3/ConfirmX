<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ConfirmX</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
  <h2>🚆 ConfirmX</h2>

  <button onclick="showSection('pnrSection')">PNR Status</button>
  <button onclick="showSection('trainSection')">Seat Availability</button>
</div>

<!-- Main -->
<div class="main">

  <!-- PNR SECTION -->
  <div id="pnrSection" class="section active">

    <h1>Check PNR Status</h1>

    <input type="text" id="pnrInput" placeholder="Enter PNR Number">
    <button onclick="fetchPNR()">Check Now</button>

    <div id="pnrResult"></div>

    <div class="card" id="trainInfo"></div>
    <div class="card" id="passengerInfo"></div>
    <div class="card" id="extraInfo"></div>

  </div>

  <!-- TRAIN SECTION -->
  <div id="trainSection" class="section">

    <h1>Check Seat Availability</h1>

    <input type="text" id="source" placeholder="Source (NDLS)">
    <input type="text" id="destination" placeholder="Destination (GKP)">
    <input type="date" id="date">
    <input type="text" id="trainNumber" placeholder="Optional Train Number">

    <button onclick="searchTrains()">Search</button>

    <div id="trainResults"></div>

  </div>

</div>

<script src="script.js"></script>

</body>
</html>
