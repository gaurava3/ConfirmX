<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ConfirmX</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <h1>ConfirmX</h1>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <h2>Train Ticket Prediction System</h2>
    <p>Accurate confirmation chances using smart prediction</p>
  </section>

  <!-- PNR SECTION -->
  <section class="container">
    <div class="card-glass">
      <h2>🔍 Check PNR Status</h2>

      <div class="form-row center">
        <input type="text" id="pnrInput" placeholder="Enter PNR Number">
        <button onclick="fetchPNR()">Check Now</button>
      </div>

      <div id="pnrResult"></div>
    </div>
  </section>

  <!-- TRAIN SECTION -->
  <section class="container">
    <div class="card-glass">
      <h2>🚆 Check Seat Availability</h2>

      <div class="form-row">
        <input type="text" id="source" placeholder="From (NDLS)">
        <input type="text" id="destination" placeholder="To (GKP)">
        <input type="date" id="date">
        <input type="text" id="trainNumber" placeholder="Train Number (Optional)">
        <button id="fetchTrain()">Search</button>
      </div>

      <div id="trainResult"></div>
    </div>
  </section>

  <script src="script.js"></script>
  <script src="train.js"></script>

</body>
</html>
