<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ConfirmX</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>ConfirmX</h1>
  <p>Check your ticket confirmation chances</p>

  <!-- INPUT -->
  <input type="text" id="pnr" placeholder="Enter PNR Number">

  <!-- BUTTON -->
  <button onclick="fetchPNR()">Check Now</button>

  <!-- RESULT -->
  <div id="resultBox">

    <h2 id="result"></h2>
    <p id="message"></p>

    <!-- TRAIN INFO -->
    <div class="card" id="trainInfo"></div>

    <!-- PASSENGER INFO -->
    <div class="card" id="passengerInfo"></div>

    <!-- EXTRA INFO -->
    <div class="card" id="extraInfo"></div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
